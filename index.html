<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime 飲食日記</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6fa5">
<link rel="apple-touch-icon" href="icon-512.png">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
background:linear-gradient(180deg,#ffd6eb,#ffeef7);
}
.wrapper{max-width:520px;margin:0 auto;padding:20px 16px 40px;}
h2{text-align:center;color:#e91e63;}
.tabs{display:flex;gap:6px;margin-bottom:14px;}
.tabs button{
flex:1;padding:8px;border:none;border-radius:12px;
background:#ffd6eb;color:#d81b60;font-weight:600;font-size:13px;
}
.active{background:#ff6fa5!important;color:white!important;}
.card{
background:white;border-radius:20px;padding:16px;margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
.cat-header{display:flex;align-items:center;gap:10px;}
.avatar{
width:52px;height:52px;border-radius:50%;
border:3px solid #ff6fa5;object-fit:cover;
}
input,select{
width:100%;padding:10px;margin-top:6px;
border-radius:12px;border:1px solid #ddd;font-size:14px;
}
button.action{
margin-top:10px;width:100%;padding:10px;
border:none;border-radius:12px;
background:#ff6fa5;color:white;font-weight:600;
}
.small-btn{
padding:4px 8px;background:#e53935;border:none;
border-radius:8px;font-size:12px;color:white;
}
.progress-bar{
width:100%;height:12px;background:#f3c6da;
border-radius:10px;margin-top:6px;overflow:hidden;
}
.progress-bar div{
height:100%;width:0%;background:#e91e63;
transition:0.3s;
}
.tab-content{display:none;}
.meal-row{
display:flex;justify-content:space-between;
font-size:13px;margin-top:6px;
}
</style>
</head>

<body>
<div class="wrapper">
<h2>🌸 Hina & Hime 飲食日記</h2>

<div class="tabs">
<button onclick="showTab('home')" id="tab-home">今日</button>
<button onclick="showTab('foods')" id="tab-foods">食物庫</button>
<button onclick="showTab('weight')" id="tab-weight">體重</button>
</div>

<div id="home" class="tab-content">
<div class="card">
<input type="date" id="datePicker">
</div>
<div id="catsContainer"></div>
</div>

<div id="foods" class="tab-content">
<div class="card">
<h3>新增食物</h3>
<input id="foodName" placeholder="名稱">
<input id="foodCal" type="number" placeholder="每100g熱量">
<input id="foodWater" type="number" placeholder="水分%">
<select id="foodType">
<option value="wet">濕食</option>
<option value="dry">乾食</option>
<option value="soup">湯罐</option>
</select>
<button class="action" onclick="addFood()">新增</button>
</div>
<div class="card">
<h3>食物列表</h3>
<div id="foodList"></div>
</div>
</div>

<div id="weight" class="tab-content">
<div class="card">
<h3>新增體重</h3>
<input id="hinaWeig
