<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime 飲食日記</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6fa5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-512.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
background:linear-gradient(180deg,#ffd6eb,#ffeef7);
}
.wrapper{
max-width:520px;
margin:0 auto;
padding:20px 16px 40px;
}
h2{
text-align:center;
color:#e91e63;
margin-bottom:14px;
}
.tabs{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:14px;
}
.tabs button{
flex:1;
padding:8px;
border:none;
border-radius:12px;
background:#ffd6eb;
color:#d81b60;
font-weight:600;
font-size:13px;
}
.active{
background:#ff6fa5 !important;
color:white !important;
}
.card{
background:white;
border-radius:20px;
padding:16px;
margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
.cat-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:8px;
}
.avatar{
width:52px;
height:52px;
border-radius:50%;
border:3px solid #ff6fa5;
object-fit:cover;
}
input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}
button.action{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:#ff6fa5;
color:white;
font-weight:600;
}
.small-btn{
padding:4px 8px;
background:#e53935;
border:none;
border-radius:8px;
font-size:12px;
color:white;
}
.date-display{
text-align:center;
background:#f5f5f5;
padding:8px;
border-radius:12px;
font-weight:600;
margin-bottom:8px;
}
.meal-row{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:6px;
}
.progress-bar{
width:100%;
height:12px;
background:#f3c6da;
border-radius:10px;
margin-top:6px;
overflow:hidden;
}
.progress-bar div{
height:100%;
width:0%;
background:#e91e63;
transition:0.3s;
}
.remain-text{
font-size:13px;
margin-top:4px;
}
.tab-content{display:none;}
canvas{max-height:250px;}
</style>
</head>

<body>
<div class="wrapper">
<h2>🌸 Hina & Hime 飲食日記</h2>

<div class="tabs">
<button onclick="showTab('home')" id="tab-home">今日</button>
<button onclick="showTab('products')" id="tab-products">產品</button>
<button onclick="showTab('chart')" id="tab-chart">圖表</button>
<button onclick="showTab('weight')" id="tab-weight">體重</button>
<button onclick="showTab('export')" id="tab-export">匯出</button>
</div>

<div id="home" class="tab-content">
<div class="card">
<div class="cat-header">
<img src="IMG_0493.jpeg" class="avatar"><h3>Hina</h3>
</div>
<div class="date-display" id="hinaDate"></div>
<select id="hinaProduct"></select>
<input id="hinaGrams" type="number" placeholder="克數">
<input id="hinaExtraWater" type="number" placeholder="額外加水 ml">
<button class="action" onclick="addMeal('hina')">新增餵食</button>
<div id="hinaTotal"></div>
<div class="progress-bar"><div id="hinaBar"></div></div>
<div id="hinaRemain"></div>
<div id="hinaMeals"></div>
</div>

<div class="card">
<div class="cat-header">
<img src="IMG_0492.jpeg" class="avatar"><h3>Hime</h3>
</div>
<div class="date-display" id="himeDate"></div>
<select id="himeProduct"></select>
<input id="himeGrams" type="number" placeholder="克數">
<input id="himeExtraWater" type="number" placeholder="額外加水 ml">
<button class="action" onclick="addMeal('hime')">新增餵食</button>
<div id="himeTotal"></div>
<div class="progress-bar"><div id="himeBar"></div></div>
<div id="himeRemain"></div>
<div id="himeMeals"></div>
</div>
</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[];
let meals=JSON.parse(localStorage.getItem("meals"))||[];
let weights=JSON.parse(localStorage.getItem("weights"))||[];

function showTab(tab){
document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove("active"));
document.getElementById(tab).style.display='block';
document.getElementById("tab-"+tab).classList.add("active");
}
showTab("home");

function todayMinguo(){
let d=new Date();
return (d.getFullYear()-1911)+"年"+
(d.getMonth()+1).toString().padStart(2,"0")+"月"+
d.getDate().toString().padStart(2,"0")+"日";
}
hinaDate.innerText=todayMinguo();
himeDate.innerText=todayMinguo();

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("meals",JSON.stringify(meals));
localStorage.setItem("weights",JSON.stringify(weights));
}
function addMeal(cat){
let grams=Number(document.getElementById(cat+"Grams").value);
let extra=Number(document.getElementById(cat+"ExtraWater").value)||0;
let product=products[document.getElementById(cat+"Product").value];
if(!product||!grams)return;

let cal=grams/100*product.cal;
let water=product.type!=="dry"?grams*(product.water/100):0;
if(product.type==="soup")water+=extra;

let date=new Date().toISOString().split('T')[0];
meals.push({date,cat,cal,water});
save();
updateDisplay();
}

function updateDisplay(){
let today=new Date().toISOString().split('T')[0];
let h1=0,h2=0;
hinaMeals.innerHTML="";
himeMeals.innerHTML="";
meals.forEach((m,i)=>{
if(m.date===today){
let row=`🔥${Math.round(m.cal)} 💧${Math.round(m.water)}`;
if(m.cat==="hina"){
h1+=m.cal;
hinaMeals.innerHTML+=`<div class="meal-row">${row}</div>`;
}else{
h2+=m.cal;
himeMeals.innerHTML+=`<div class="meal-row">${row}</div>`;
}
}
});
hinaTotal.innerHTML=`🔥 今日熱量 ${Math.round(h1)} kcal`;
himeTotal.innerHTML=`🔥 今日熱量 ${Math.round(h2)} kcal`;
hinaBar.style.width=Math.min(100,h1)+"%";
himeBar.style.width=Math.min(100,h2)+"%";
}

updateDisplay();

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>
</body>
</html>
