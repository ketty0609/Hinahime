<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime 飲食日記</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6fa5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-512.png.PNG">
<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
background:linear-gradient(180deg,#ffd6eb,#ffeef7);
}
.wrapper{
max-width:520px;
margin:0 auto;
padding:20px 16px 40px;
}
h2{
text-align:center;
color:#e91e63;
margin-bottom:14px;
}
.tabs{
display:flex;
gap:6px;
margin-bottom:14px;
}
.tabs button{
flex:1;
padding:8px;
border:none;
border-radius:12px;
background:#ffd6eb;
color:#d81b60;
font-weight:600;
font-size:13px;
}
.active{
background:#ff6fa5 !important;
color:white !important;
}
.card{
background:white;
border-radius:20px;
padding:16px;
margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
.cat-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:8px;
}
.avatar{
width:52px;
height:52px;
border-radius:50%;
border:3px solid #ff6fa5;
object-fit:cover;
}
input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}
button.action{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:#ff6fa5;
color:white;
font-weight:600;
}
.small-btn{
padding:4px 8px;
background:#e53935;
border:none;
border-radius:8px;
font-size:12px;
color:white;
}
.date-display{
text-align:center;
background:#f5f5f5;
padding:8px;
border-radius:12px;
font-weight:600;
margin-bottom:8px;
}
.meal-row{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:6px;
}
.progress-bar{
width:100%;
height:12px;
background:#f3c6da;
border-radius:10px;
margin-top:6px;
overflow:hidden;
}
.progress-bar div{
height:100%;
width:0%;
background:#e91e63;
transition:0.3s;
}
.remain-text{
font-size:13px;
margin-top:4px;
}
.tab-content{display:none;}
canvas{max-height:250px;}
</style>
</head>

<body>
<div class="wrapper">
<h2>🌸 Hina & Hime 飲食日記</h2>

<div class="tabs">
<button onclick="showTab('home')" id="tab-home">今日</button>
<button onclick="showTab('products')" id="tab-products">產品</button>
<button onclick="showTab('chart')" id="tab-chart">圖表</button>
<button onclick="showTab('weight')" id="tab-weight">體重</button>
<button onclick="showTab('export')" id="tab-export">匯出</button>
</div>

<!-- 今日 -->
<div id="home" class="tab-content">
<div class="card">
<input type="date" id="selectedDate" onchange="changeDate()">
</div>

<div class="card">
<div class="cat-header">
<img src="IMG_0493.jpeg" class="avatar"><h3>Hina</h3>
</div>
<div class="date-display" id="hinaDate"></div>
<select id="hinaProduct"></select>
<input id="hinaGrams" type="number" placeholder="克數">
<input id="hinaExtraWater" type="number" placeholder="額外加水 ml">
<button class="action" onclick="addMeal('hina')">新增餵食</button>
<div id="hinaTotal"></div>
<div class="progress-bar"><div id="hinaBar"></div></div>
<div id="hinaRemain"></div>
<div id="hinaMeals"></div>
</div>

<div class="card">
<div class="cat-header">
<img src="IMG_0492.jpeg" class="avatar"><h3>Hime</h3>
</div>
<div class="date-display" id="himeDate"></div>
<select id="himeProduct"></select>
<input id="himeGrams" type="number" placeholder="克數">
<input id="himeExtraWater" type="number" placeholder="額外加水 ml">
<button class="action" onclick="addMeal('hime')">新增餵食</button>
<div id="himeTotal"></div>
<div class="progress-bar"><div id="himeBar"></div></div>
<div id="himeRemain"></div>
<div id="himeMeals"></div>
</div>

</div>

<!-- 產品 -->
<div id="products" class="tab-content">
<div class="card">
<h3>📦 新增產品</h3>
<input id="pname" placeholder="產品名稱">
<input id="cal" type="number" placeholder="每100g熱量">
<input id="water" type="number" placeholder="水分%">
<select id="ptype">
<option value="wet">濕食</option>
<option value="dry">乾食</option>
<option value="soup">湯罐</option>
</select>
<button class="action" onclick="addProduct()">新增產品</button>
</div>

<div class="card">
<h3>📋 產品列表</h3>
<select id="filterType" onchange="renderProductList()">
<option value="all">全部</option>
<option value="wet">濕食</option>
<option value="dry">乾食</option>
<option value="soup">湯罐</option>
</select>
<div id="productList"></div>
</div>
</div>

<!-- 圖表 -->
<div id="chart" class="tab-content">
<div class="card"><h3>🔥 熱量</h3><canvas id="calChart"></canvas></div>
<div class="card"><h3>💧 水量</h3><canvas id="waterChart"></canvas></div>
</div>

<!-- 體重 -->
<div id="weight" class="tab-content">
<div class="card">
<h3>⚖ 新增體重</h3>
<input id="hinaWeight" type="number" step="0.1" placeholder="Hina 體重 kg">
<input id="himeWeight" type="number" step="0.1" placeholder="Hime 體重 kg">
<button class="action" onclick="saveWeight()">儲存體重</button>
</div>

<div class="card">
<h3>📋 體重紀錄</h3>
<div id="weightList"></div>
</div>

<div class="card">
<h3>📈 近7日體重變化</h3>
<canvas id="weightChart"></canvas>
</div>
</div>

<!-- 匯出 -->
<div id="export" class="tab-content">
<div class="card">
<button class="action" onclick="exportData()">📤 匯出資料</button>
</div>
</div>

</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[];
let meals=JSON.parse(localStorage.getItem("meals"))||[];
let weights=JSON.parse(localStorage.getItem("weights"))||[];
let currentDate = new Date().toISOString().split('T')[0];

function showTab(tab){
document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove("active"));
document.getElementById(tab).style.display='block';
document.getElementById("tab-"+tab).classList.add("active");
}
showTab("home");

function todayMinguo(){
let d=new Date();
return (d.getFullYear()-1911)+"年"+
(d.getMonth()+1).toString().padStart(2,"0")+"月"+
d.getDate().toString().padStart(2,"0")+"日";
}
hinaDate.innerText=todayMinguo();
himeDate.innerText=todayMinguo();

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("meals",JSON.stringify(meals));
localStorage.setItem("weights",JSON.stringify(weights));
}

function addProduct(){
products.push({name:pname.value,cal:Number(cal.value),water:Number(water.value),type:ptype.value});
save();
updateProducts();
renderProductList();
}

function renderProductList(){
let type=filterType.value;
productList.innerHTML="";
products.forEach((p,i)=>{
if(type==="all"||p.type===type){
productList.innerHTML+=`
<div class="meal-row">
<div><strong>${p.name}</strong><br>🔥 ${p.cal} kcal / 💧 ${p.water}%</div>
<button class="small-btn" onclick="deleteProduct(${i})">刪</button>
</div>`;
}
});
}

function deleteProduct(i){
products.splice(i,1);
save();
updateProducts();
renderProductList();
}

function updateProducts(){
hinaProduct.innerHTML="";
himeProduct.innerHTML="";
products.forEach((p,i)=>{
let opt=document.createElement("option");
opt.value=i;
opt.text=p.name;
hinaProduct.appendChild(opt);
himeProduct.appendChild(opt.cloneNode(true));
});
}

function addMeal(cat){
let grams=Number(document.getElementById(cat+"Grams").value);
let extra=Number(document.getElementById(cat+"ExtraWater").value)||0;
let product=products[document.getElementById(cat+"Product").value];
if(!product||!grams)return;

let cal=grams/100*product.cal;
let water=product.type!=="dry"?grams*(product.water/100):0;
if(product.type==="soup")water+=extra;

let date=currentDate;

meals.push({date,cat,cal,water});
save();
updateDisplay();
drawCharts();
}

function deleteMeal(i){
meals.splice(i,1);
save();
updateDisplay();
drawCharts();
}

function calculateNeed(w){
return Math.round(70*Math.pow(w,0.75)*1.2);
}

function updateDisplay(){
let today=currentDate;

let h1=0,h2=0;
hinaMeals.innerHTML="";
himeMeals.innerHTML="";
meals.forEach((m,i)=>{
if(m.date===today){
let row=`🔥${Math.round(m.cal)} 💧${Math.round(m.water)}`;
if(m.cat==="hina"){
h1+=m.cal;
hinaMeals.innerHTML+=`<div class="meal-row">${row}<button class="small-btn" onclick="deleteMeal(${i})">刪</button></div>`;
}else{
h2+=m.cal;
himeMeals.innerHTML+=`<div class="meal-row">${row}<button class="small-btn" onclick="deleteMeal(${i})">刪</button></div>`;
}
}
});

let latest=weights.length?weights[weights.length-1]:{hina:3.5,hime:2.5};
let needH1=calculateNeed(latest.hina);
let needH2=calculateNeed(latest.hime);

hinaTotal.innerHTML=`🔥 今日熱量 ${Math.round(h1)} / ${needH1} kcal`;
himeTotal.innerHTML=`🔥 今日熱量 ${Math.round(h2)} / ${needH2} kcal`;

let p1=Math.min(100,(h1/needH1)*100);
let p2=Math.min(100,(h2/needH2)*100);

hinaBar.style.width=p1+"%";
himeBar.style.width=p2+"%";

hinaRemain.innerHTML=h1>needH1?
`<div class="remain-text">⚠ 超過 ${Math.round(h1-needH1)} kcal</div>`:
`<div class="remain-text">還差 ${Math.round(needH1-h1)} kcal</div>`;

himeRemain.innerHTML=h2>needH2?
`<div class="remain-text">⚠ 超過 ${Math.round(h2-needH2)} kcal</div>`:
`<div class="remain-text">還差 ${Math.round(needH2-h2)} kcal</div>`;
}

function saveWeight(){
let date=new Date().toISOString().split('T')[0];
weights.push({date,hina:Number(hinaWeight.value),hime:Number(himeWeight.value)});
save();
renderWeightList();
drawWeightChart();
}
function changeDate(){
currentDate = document.getElementById("selectedDate").value;
updateDisplay();
drawCharts();
}

document.getElementById("selectedDate").value = currentDate;

function renderWeightList(){
weightList.innerHTML="";
weights.slice().reverse().forEach((w,i)=>{
weightList.innerHTML+=`
<div class="meal-row">
${w.date} | Hina ${w.hina}kg | Hime ${w.hime}kg
<button class="small-btn" onclick="deleteWeight(${weights.length-1-i})">刪</button>
</div>`;
});
}

function deleteWeight(i){
weights.splice(i,1);
save();
renderWeightList();
drawWeightChart();
}

function drawCharts(){
let labels=[],cal1=[],cal2=[],water1=[],water2=[];
for(let i=6;i>=0;i--){
let d=new Date();
d.setDate(d.getDate()-i);
let ds=d.toISOString().split('T')[0];
labels.push(ds.slice(5));
let c1=0,c2=0,w1=0,w2=0;
meals.forEach(m=>{
if(m.date===ds){
if(m.cat==="hina"){c1+=m.cal;w1+=m.water;}
else{c2+=m.cal;w2+=m.water;}
}
});
cal1.push(c1);cal2.push(c2);
water1.push(w1);water2.push(w2);
}
new Chart(calChart,{type:"line",data:{labels,
datasets:[
{label:"Hina",data:cal1,borderColor:"#e91e63",borderWidth:4},
{label:"Hime",data:cal2,borderColor:"#8e24aa",borderWidth:4}
]}});
new Chart(waterChart,{type:"line",data:{labels,
datasets:[
{label:"Hina",data:water1,borderColor:"#1565c0",borderWidth:4},
{label:"Hime",data:water2,borderColor:"#00897b",borderWidth:4}
]}});
}

function drawWeightChart(){
let labels=[],h1=[],h2=[];
weights.slice(-7).forEach(w=>{
labels.push(w.date.slice(5));
h1.push(w.hina);
h2.push(w.hime);
});
new Chart(weightChart,{type:"line",data:{labels,
datasets:[
{label:"Hina",data:h1,borderColor:"#ff9800",borderWidth:4},
{label:"Hime",data:h2,borderColor:"#4caf50",borderWidth:4}
]}});
}

function exportData(){
let data={products,meals,weights};
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="hina_hime_data.json";
a.click();
}

updateProducts();
renderProductList();
updateDisplay();
renderWeightList();
drawCharts();
drawWeightChart();

</script>
</body>
</html>
