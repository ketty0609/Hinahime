<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime 飲食日記</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6fa5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
background:linear-gradient(180deg,#ffd6eb,#ffeef7);
min-height: 100vh;
}
.wrapper{max-width:520px;margin:0 auto;padding:20px 16px 40px;}
h2{text-align:center;color:#e91e63;}
.tabs{display:flex;gap:6px;margin-bottom:14px;}
.tabs button{
flex:1;padding:12px;border:none;border-radius:12px;
background:#ffd6eb;color:#d81b60;font-weight:600;font-size:14px;
cursor: pointer;
}
.active{background:#ff6fa5!important;color:white!important;}
.card{
background:white;border-radius:20px;padding:16px;margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom: 10px;}
.avatar{
width:52px;height:52px;border-radius:50%;
border:3px solid #ff6fa5;object-fit:cover;
background: #eee;
}
input,select{
width:100%;padding:10px;margin-top:8px;
border-radius:12px;border:1px solid #ddd;font-size:14px;
}
button.action{
margin-top:12px;width:100%;padding:12px;
border:none;border-radius:12px;
background:#ff6fa5;color:white;font-weight:600;font-size: 16px;
cursor: pointer;
}
.small-btn{
padding:4px 10px;background:#ffcdd2;border:none;
border-radius:8px;font-size:12px;color:#c62828;
cursor: pointer;
}
.progress-bar{
width:100%;height:14px;background:#fce4ec;
border-radius:10px;margin-top:6px;overflow:hidden;
}
.progress-bar div{
height:100%;width:0%;background:#e91e63;
transition: width 0.5s ease-in-out;
}
.tab-content{display:none;}
.meal-row{
display:flex;justify-content:space-between;align-items: center;
font-size:14px;margin-top:8px;padding: 4px 0;
border-bottom: 1px dashed #eee;
}
h3 { margin-top: 0; color: #d81b60; font-size: 18px; }
.info-text { font-size: 13px; color: #666; margin: 4px 0; }
</style>
</head>

<body>
<div class="wrapper">
<h2>🌸 Hina & Hime 飲食日記</h2>

<div class="tabs">
<button onclick="showTab('home')" id="tab-home">今日飲食</button>
<button onclick="showTab('foods')" id="tab-foods">食物庫</button>
<button onclick="showTab('weight')" id="tab-weight">體重紀錄</button>
</div>

<div id="home" class="tab-content">
<div class="card">
<input type="date" id="datePicker">
</div>
<div id="catsContainer"></div>
</div>

<div id="foods" class="tab-content">
<div class="card">
<h3>✨ 新增食物</h3>
<input id="foodName" placeholder="食物名稱 (如: 汪喵主食罐)">
<input id="foodCal" type="number" placeholder="每 100g 熱量 (kcal)">
<input id="foodWater" type="number" placeholder="含水量 % (一般罐頭約 75-80)">
<select id="foodType">
<option value="wet">濕食 (罐頭/生食)</option>
<option value="dry">乾食 (飼料)</option>
<option value="soup">湯罐 (副食/額外加水)</option>
</select>
<button class="action" onclick="addFood()">存入食物庫</button>
</div>
<div class="card">
<h3>📦 我的食物庫</h3>
<div id="foodList"></div>
</div>
</div>

<div id="weight" class="tab-content">
<div class="card">
<h3>⚖️ 記錄體重</h3>
<div class="info-text">輸入體重後，系統會自動重新計算每日需求。</div>
<input id="hinaWeightInput" type="number" step="0.1" placeholder="Hina 目前體重 (kg)">
<input id="himeWeightInput" type="number" step="0.1" placeholder="Hime 目前體重 (kg)">
<button class="action" onclick="addWeight()">儲存體重</button>
</div>
<div class="card">
<h3>📈 體重紀錄清單</h3>
<div id="weightList"></div>
</div>
</div>

</div>

<script>
// 初始化資料
let foods = JSON.parse(localStorage.getItem("foods")) || [];
let records = JSON.parse(localStorage.getItem("records")) || {};
let weights = JSON.parse(localStorage.getItem("weights")) || [];

// 取得今天日期 (台灣時區)
function getToday(){
    const now = new Date();
    const taiwanOffset = 8 * 60; 
    const local = new Date(now.getTime() + (taiwanOffset - now.getTimezoneOffset()) * 60000);
    return local.toISOString().split("T")[0];
}

function getCurrentDate(){
    const picker = document.getElementById("datePicker");
    return picker.value || getToday();
}

function save(){
    localStorage.setItem("foods", JSON.stringify(foods));
    localStorage.setItem("records", JSON.stringify(records));
    localStorage.setItem("weights", JSON.stringify(weights));
}

// 切換分頁
function showTab(tab){
    document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove("active"));
    document.getElementById(tab).style.display='block';
    document.getElementById("tab-"+tab).classList.add("active");
    
    // 切換分頁時重新整理內容，確保數據同步
    if(tab === 'home') renderCats(); 
    if(tab === 'foods') renderFoodList();
    if(tab === 'weight') renderWeightList();
}

// 計算 RER (基礎代謝量) 
function calculateNeed(w){
    return Math.round(70 * Math.pow(w, 0.75) * 1.2); 
}

// 計算所需水量 (50ml/kg)
function calculateWaterNeed(w){
    return Math.round(w * 50);
}

// 渲染貓咪卡片區塊
function renderCats(){
    const container = document.getElementById("catsContainer");
    container.innerHTML = "";
    ["hina", "hime"].forEach(cat => {
        const name = cat === "hina" ? "Hina" : "Hime";
        const img = cat === "hina" ? "IMG_0493.jpeg" : "IMG_0492.jpeg"; // 請確保圖片路徑正確

        container.innerHTML += `
        <div class="card">
            <div class="cat-header">
                <img src="${img}" class="avatar" alt="${name}">
                <h3>${name}</h3>
            </div>

            <select id="${cat}Category" onchange="updateFoodSelect('${cat}')">
                <option value="">-- 選擇類別 --</option>
                <option value="wet">濕食</option>
                <option value="dry">乾食</option>
                <option value="soup">湯罐</option>
            </select>

            <select id="${cat}Food"><option value="">請先選擇類別</option></select>
            <input type="number" id="${cat}Grams" placeholder="餵食克數 (g)">
            <input type="number" id="${cat}Extra" placeholder="額外加水 (ml)">
            <button class="action" onclick="addMeal('${cat}')">新增此餐紀錄</button>

            <div style="margin-top:15px;">
                <div id="${cat}Total" style="font-weight:bold;">🔥 0 / 0 kcal</div>
                <div class="progress-bar"><div id="${cat}Bar"></div></div>
                
                <div id="${cat}WaterTotal" style="font-weight:bold; margin-top:10px;">💧 0 / 0 ml</div>
                <div class="progress-bar"><div id="${cat}WaterBar" style="background:#2196f3"></div></div>
            </div>

            <div id="${cat}Meals" style="margin-top:15px; border-top:1px solid #eee;"></div>
        </div>
        `;
    });
    updateDisplay();
}

// 更新食物下拉選單
function updateFoodSelect(cat){
    let type = document.getElementById(cat + "Category").value;
    let select = document.getElementById(cat + "Food");
    select.innerHTML = '<option value="">-- 選擇食物 --</option>';
    
    foods.forEach((f, i) => {
        if(f.type === type){
            let opt = document.createElement("option");
            opt.value = i;
            opt.text = f.name;
            select.appendChild(opt);
        }
    });
}

// 新增食物到資料庫
function addFood(){
    const name = document.getElementById("foodName").value;
    const cal = Number(document.getElementById("foodCal").value);
    const water = Number(document.getElementById("foodWater").value);
    const type = document.getElementById("foodType").value;

    if(!name || !cal) { alert("請填寫名稱與熱量"); return; }

    foods.push({ name, cal, water, type });
    save();
    renderFoodList();
    
    // 清空輸入
    document.getElementById("foodName").value = "";
    document.getElementById("foodCal").value = "";
    document.getElementById("foodWater").value = "";
}

function renderFoodList(){
    const list = document.getElementById("foodList");
    list.innerHTML = foods.length === 0 ? "目前還沒有食物唷！" : "";
    foods.forEach((f, i) => {
        list.innerHTML += `
        <div class="meal-row">
            <span>${f.name} <small>(${f.cal}kcal/100g)</small></span>
            <button class="small-btn" onclick="deleteFood(${i})">刪除</button>
        </div>`;
    });
}

function deleteFood(i){
    if(confirm("確定要刪除這個食物嗎？")) {
        foods.splice(i, 1);
        save();
        renderFoodList();
    }
}

// 新增餵食紀錄 (關鍵修正點)
function addMeal(cat){
    const date = getCurrentDate();
    const foodIdx = document.getElementById(cat + "Food").value;
    const gInput = document.getElementById(cat + "Grams");
    const eInput = document.getElementById(cat + "Extra");
    
    const grams = Number(gInput.value);
    const extra = Number(eInput.value) || 0;

    if(foodIdx === "" || !grams) {
        alert("請選擇食物並輸入克數");
        return;
    }

    const food = foods[foodIdx];
    const cal = (grams / 100) * food.cal;
    let water = grams * (food.water / 100);
    if(food.type === "soup" || food.type === "wet"){
        water += extra; // 湯罐或濕食額外加水
    }

    if(!records[date]) records[date] = { hina: [], hime: [] };

    records[date][cat].push({
        name: food.name,
        grams,
        cal,
        water
    });

    save();
    updateDisplay();

    // 清空輸入框
    gInput.value = "";
    eInput.value = "";
}

// 更新今日進度與列表
function updateDisplay(){
    const date = getCurrentDate();
    const dayData = records[date] || { hina: [], hime: [] };
    const latestWeight = weights.length ? weights[weights.length-1] : { hina: 3.5, hime: 2.5 };

    ["hina", "hime"].forEach(cat => {
        let totalCal = 0;
        let totalWater = 0;
        const list = document.getElementById(cat + "Meals");
        if(!list) return; // 防止分頁未載入報錯
        
        list.innerHTML = "";

        dayData[cat].forEach((m, i) => {
            totalCal += m.cal;
            totalWater += m.water;
            list.innerHTML += `
            <div class="meal-row">
                <span>${m.name} ${m.grams}g</span>
                <span>${Math.round(m.cal)}kcal <button class="small-btn" onclick="deleteMeal('${cat}',${i})">X</button></span>
            </div>`;
        });

        const needCal = calculateNeed(latestWeight[cat]);
        const needWater = calculateWaterNeed(latestWeight[cat]);

        // 更新 UI
        document.getElementById(cat + "Total").innerText = `🔥 ${Math.round(totalCal)} / ${needCal} kcal`;
        let perCal = Math.min(100, (totalCal / needCal) * 100);
        document.getElementById(cat + "Bar").style.width = perCal + "%";

        document.getElementById(cat + "WaterTotal").innerText = `💧 ${Math.round(totalWater)} / ${needWater} ml`;
        let perWater = Math.min(100, (totalWater / needWater) * 100);
        document.getElementById(cat + "WaterBar").style.width = perWater + "%";
    });
}

function deleteMeal(cat, i){
    const date = getCurrentDate();
    records[date][cat].splice(i, 1);
    save();
    updateDisplay();
}

// 體重管理
function addWeight(){
    const h = document.getElementById("hinaWeightInput").value;
    const m = document.getElementById("himeWeightInput").value;
    if(!h || !m) { alert("請輸入兩隻貓咪的體重"); return; }
    
    weights.push({
        date: getCurrentDate(),
        hina: Number(h),
        hime: Number(m)
    });
    save();
    renderWeightList();
    alert("體重已更新，熱量需求已重新計算！");
}

function renderWeightList(){
    const list = document.getElementById("weightList");
    list.innerHTML = "";
    weights.slice().reverse().forEach((w, i) => {
        list.innerHTML += `
        <div class="meal-row">
            ${w.date} | H:${w.hina}kg M:${w.hime}kg
            <button class="small-btn" onclick="deleteWeight(${weights.length-1-i})">刪</button>
        </div>`;
    });
}

function deleteWeight(i){
    weights.splice(i, 1);
    save();
    renderWeightList();
}

// 初始化
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("datePicker").value = getToday();
    document.getElementById("datePicker").addEventListener("change", updateDisplay);
    showTab("home");
});
</script>
</body>
</html>
