<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime 飲食日記</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6fa5">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-512.png.PNG">

<style>
body{margin:0;font-family:-apple-system;background:linear-gradient(180deg,#ffd6eb,#ffeef7);}
.wrapper{max-width:520px;margin:auto;padding:16px;}
h2{text-align:center;color:#e91e63;}
.card{background:white;padding:16px;border-radius:18px;margin-bottom:14px;}
button{background:#ff6fa5;color:white;border:none;padding:8px;border-radius:10px;width:100%;margin-top:6px;}
input,select{width:100%;padding:8px;margin-top:6px;border-radius:8px;border:1px solid #ddd;}
.progress{background:#f3c6da;height:10px;border-radius:10px;margin-top:6px;overflow:hidden;}
.progress div{height:100%;background:#e91e63;width:0%;}
.small{background:#e53935;padding:3px 6px;border-radius:6px;font-size:12px;}
</style>
</head>
<body>
<div class="wrapper">
<h2>🌸 Hina & Hime 雲端日記</h2>

<div class="card">
<label>選擇日期</label>
<input type="date" id="datePicker">
</div>

<div class="card">
<h3>新增食物</h3>
<input id="foodName" placeholder="名稱">
<input id="foodCal" type="number" placeholder="每100g熱量">
<select id="foodType">
<option value="wet">濕食</option>
<option value="dry">乾食</option>
<option value="soup">湯罐</option>
</select>
<button onclick="addFood()">新增</button>
</div>

<div class="card">
<h3>食物列表</h3>
<div id="foodList"></div>
</div>

<div class="card">
<h3>Hina</h3>
<select id="hinaFood"></select>
<input id="hinaGram" type="number" placeholder="克數">
<button onclick="addRecord('hina')">新增</button>
<div id="hinaTotal"></div>
<div class="progress"><div id="hinaBar"></div></div>
<div id="hinaRecords"></div>
</div>

<div class="card">
<h3>Hime</h3>
<select id="himeFood"></select>
<input id="himeGram" type="number" placeholder="克數">
<button onclick="addRecord('hime')">新增</button>
<div id="himeTotal"></div>
<div class="progress"><div id="himeBar"></div></div>
<div id="himeRecords"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCcC7_sycTUNTIhRhPrFpkHoat2JZ_lmoI",
authDomain: "hinahime-df1a0.firebaseapp.com",
projectId: "hinahime-df1a0",
storageBucket: "hinahime-df1a0.firebasestorage.app",
messagingSenderId: "705041671463",
appId: "1:705041671463:web:67ce9ce2346dfc3cddb502"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentDate;

function getToday(){
const d=new Date();
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

document.addEventListener("DOMContentLoaded",()=>{
currentDate=getToday();
datePicker.value=currentDate;
loadFoods();
loadRecords();
});

datePicker.addEventListener("change",()=>{
currentDate=datePicker.value;
loadRecords();
});

async function addFood(){
await addDoc(collection(db,"foods"),{
name:foodName.value,
cal:Number(foodCal.value),
type:foodType.value
});
foodName.value="";
foodCal.value="";
loadFoods();
}

async function loadFoods(){
const query=await getDocs(collection(db,"foods"));
foodList.innerHTML="";
hinaFood.innerHTML="";
himeFood.innerHTML="";
query.forEach(docu=>{
const data=docu.data();
foodList.innerHTML+=`<div>${data.name} 🔥${data.cal}
<button class="small" onclick="deleteFood('${docu.id}')">刪</button></div>`;
hinaFood.innerHTML+=`<option value="${docu.id}|${data.cal}">${data.name}</option>`;
himeFood.innerHTML+=`<option value="${docu.id}|${data.cal}">${data.name}</option>`;
});
}

window.deleteFood=async(id)=>{
await deleteDoc(doc(db,"foods",id));
loadFoods();
};

async function addRecord(cat){
let select=cat==="hina"?hinaFood:himeFood;
let gram=cat==="hina"?hinaGram.value:himeGram.value;
if(!gram)return;
let [id,cal]=select.value.split("|");
await addDoc(collection(db,"records"),{
date:currentDate,
cat,
cal:Number(cal)*(gram/100)
});
loadRecords();
}

async function loadRecords(){
const query=await getDocs(collection(db,"records"));
let h1=0,h2=0;
hinaRecords.innerHTML="";
himeRecords.innerHTML="";
query.forEach(docu=>{
let d=docu.data();
if(d.date===currentDate){
if(d.cat==="hina"){
h1+=d.cal;
hinaRecords.innerHTML+=`<div>🔥${Math.round(d.cal)}</div>`;
}else{
h2+=d.cal;
himeRecords.innerHTML+=`<div>🔥${Math.round(d.cal)}</div>`;
}
}
});
hinaTotal.innerHTML=`今日 ${Math.round(h1)} kcal`;
himeTotal.innerHTML=`今日 ${Math.round(h2)} kcal`;
hinaBar.style.width=Math.min(100,h1/200*100)+"%";
himeBar.style.width=Math.min(100,h2/150*100)+"%";
}
</script>
</body>
</html>
