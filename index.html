<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
background:linear-gradient(180deg,#ffd6eb,#ffeef7);
display:flex;
justify-content:center;
}
.wrapper{
width:100%;
max-width:500px;
padding:20px;
}
h2{text-align:center;color:#ff4da6;}
.tabs{display:flex;gap:6px;margin:18px 0;}
.tabs button{
flex:1;padding:8px;border:none;border-radius:10px;
background:#ffd6eb;color:#ff4da6;font-weight:600;font-size:14px;
}
.card{
background:white;padding:16px;border-radius:18px;
margin-bottom:16px;box-shadow:0 6px 16px rgba(0,0,0,0.08);
}
input,select{
width:100%;padding:10px;margin-top:6px;
border-radius:10px;border:1px solid #ddd;font-size:14px;
}
input[type="date"]{text-align:center;background:#f5f5f5;}
button.action{
width:100%;margin-top:8px;padding:10px;
border:none;border-radius:10px;
background:#ff80bf;color:white;font-size:14px;
}
.cat-header{display:flex;align-items:center;gap:8px;}
.avatar{
width:50px;height:50px;border-radius:50%;
object-fit:cover;border:2px solid #ff80bf;
}
.progress{background:#ffd6eb;height:14px;border-radius:14px;margin-top:4px;}
.bar{height:100%;border-radius:14px;}
.meal-item{
display:flex;justify-content:space-between;
font-size:12px;margin-top:4px;
}
.small-btn{
background:#ff4d4d;
padding:3px 6px;border-radius:6px;
font-size:10px;color:white;border:none;
}
.tab-content{display:none;}
.alert{color:#ff4d4d;font-size:11px;}
</style>
</head>

<body>
<div class="wrapper">
<h2>🌸 Hina & Hime Pro</h2>

<div class="tabs">
<button onclick="showTab('home')">今日</button>
<button onclick="showTab('products')">產品</button>
<button onclick="showTab('chart')">圖表</button>
<button onclick="showTab('weight')">體重</button>
<button onclick="showTab('backup')">備份</button>
</div>

<!-- 今日 -->
<div id="home" class="tab-content">

<div class="card">
<div class="cat-header">
<img src="IMG_0493.jpeg" class="avatar"><h3>Hina</h3>
</div>
<input type="date" id="hinaDate">
<select id="hinaProduct"></select>
<input id="hinaGrams" type="number" placeholder="克數">
<input id="hinaExtraWater" type="number" placeholder="額外加水 ml">
<button class="action" onclick="addMeal('hina')">新增餵食</button>
<div id="hinaStats"></div>
<div id="hinaMeals"></div>
</div>

<div class="card">
<div class="cat-header">
<img src="IMG_0492.jpeg" class="avatar"><h3>Hime</h3>
</div>
<input type="date" id="himeDate">
<select id="himeProduct"></select>
<input id="himeGrams" type="number" placeholder="克數">
<input id="himeExtraWater" type="number" placeholder="額外加水 ml">
<button class="action" onclick="addMeal('hime')">新增餵食</button>
<div id="himeStats"></div>
<div id="himeMeals"></div>
</div>

</div>

<!-- 產品 -->
<div id="products" class="tab-content">
<div class="card">
<input id="pname" placeholder="產品名稱">
<input id="cal" type="number" placeholder="每100g熱量">
<input id="water" type="number" placeholder="水分%">
<select id="ptype">
<option value="wet">濕食</option>
<option value="dry">乾食</option>
<option value="soup">湯罐</option>
</select>
<button class="action" onclick="addProduct()">新增產品</button>
</div>
</div>

<!-- 圖表 -->
<div id="chart" class="tab-content">
<div class="card"><canvas id="calChart"></canvas></div>
<div class="card"><canvas id="waterChart"></canvas></div>
</div>

<!-- 體重 -->
<div id="weight" class="tab-content">
<div class="card">
<h3>Hina 體重 (kg)</h3>
<input id="hinaWeight" type="number" step="0.1">
<button class="action" onclick="saveWeight('hina')">儲存</button>
</div>
<div class="card">
<h3>Hime 體重 (kg)</h3>
<input id="himeWeight" type="number" step="0.1">
<button class="action" onclick="saveWeight('hime')">儲存</button>
</div>
<div class="card"><canvas id="weightChart"></canvas></div>
</div>

<!-- 備份 -->
<div id="backup" class="tab-content">
<div class="card">
<button class="action" onclick="exportCSV()">匯出CSV</button>
<input type="file" onchange="importCSV(event)">
</div>
</div>

</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[];
let meals=JSON.parse(localStorage.getItem("meals"))||[];
let weights=JSON.parse(localStorage.getItem("weights"))||{hina:[],hime:[]};

hinaDate.valueAsDate=new Date();
himeDate.valueAsDate=new Date();

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("meals",JSON.stringify(meals));
localStorage.setItem("weights",JSON.stringify(weights));
}

function showTab(tab){
document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
document.getElementById(tab).style.display='block';
}
showTab('home');

function calculateGoal(weight){
if(!weight) return 0;
let rer=70*Math.pow(weight,0.75);
return Math.round(rer*1.2);
}

function addProduct(){
products.push({name:pname.value,cal:Number(cal.value),water:Number(water.value),type:ptype.value});
save();
updateProducts();
}

function updateProducts(){
hinaProduct.innerHTML="";
himeProduct.innerHTML="";
products.forEach((p,i)=>{
let opt=document.createElement("option");
opt.value=i; opt.text=p.name;
hinaProduct.appendChild(opt);
himeProduct.appendChild(opt.cloneNode(true));
});
}

function addMeal(cat){
let date=cat==="hina"?hinaDate.value:himeDate.value;
let grams=cat==="hina"?Number(hinaGrams.value):Number(himeGrams.value);
let extra=cat==="hina"?Number(hinaExtraWater.value)||0:Number(himeExtraWater.value)||0;
let product=products[cat==="hina"?hinaProduct.value:himeProduct.value];
if(!product||!grams)return;

let cal=grams/100*product.cal;
let water=0;
if(product.type!=="dry") water+=grams*(product.water/100);
if(product.type==="soup") water+=extra;

meals.push({date,cat,cal,water});
save();
updateStats();
drawCharts();
}

function deleteMeal(i){
meals.splice(i,1);
save();
updateStats();
drawCharts();
}

function updateStats(){
let today=new Date().toISOString().split('T')[0];
let h1=0,h2=0,w1=0,w2=0;
hinaMeals.innerHTML="";
himeMeals.innerHTML="";

meals.forEach((m,i)=>{
if(m.date===today){
let text=`🔥${Math.round(m.cal)} 💧${Math.round(m.water)}`;
if(m.cat==="hina"){
h1+=m.cal; w1+=m.water;
hinaMeals.innerHTML+=`<div class="meal-item">${text}<button class="small-btn" onclick="deleteMeal(${i})">刪</button></div>`;
}else{
h2+=m.cal; w2+=m.water;
himeMeals.innerHTML+=`<div class="meal-item">${text}<button class="small-btn" onclick="deleteMeal(${i})">刪</button></div>`;
}
}
});

let hGoal=calculateGoal(Number(hinaWeight.value));
let hiGoal=calculateGoal(Number(himeWeight.value));

hinaStats.innerHTML=`🔥 ${Math.round(h1)} / ${hGoal} kcal`;
himeStats.innerHTML=`🔥 ${Math.round(h2)} / ${hiGoal} kcal`;
}

function saveWeight(cat){
let value=cat==="hina"?Number(hinaWeight.value):Number(himeWeight.value);
if(!value) return;
let today=new Date().toISOString().split('T')[0];
weights[cat].push({date:today,value:value});
save();
drawWeightChart();
}

function drawWeightChart(){
let labels=[],h1=[],h2=[];
for(let i=6;i>=0;i--){
let d=new Date(); d.setDate(d.getDate()-i);
let ds=d.toISOString().split('T')[0];
labels.push(ds.slice(5));
let w1=weights.hina.find(w=>w.date===ds);
let w2=weights.hime.find(w=>w.date===ds);
h1.push(w1?w1.value:null);
h2.push(w2?w2.value:null);
}
new Chart(document.getElementById("weightChart"),{
type:"line",
data:{labels,datasets:[
{label:"Hina",data:h1,borderColor:"#ff4da6"},
{label:"Hime",data:h2,borderColor:"#ff99cc"}
]}
});
}

function drawCharts(){
let labels=[],calH1=[],calH2=[],waterH1=[],waterH2=[];
for(let i=6;i>=0;i--){
let d=new Date(); d.setDate(d.getDate()-i);
let ds=d.toISOString().split('T')[0];
labels.push(ds.slice(5));
let ch1=0,ch2=0,wh1=0,wh2=0;
meals.forEach(m=>{
if(m.date===ds){
if(m.cat==="hina"){ch1+=m.cal;wh1+=m.water;}
else{ch2+=m.cal;wh2+=m.water;}
}
});
calH1.push(ch1);calH2.push(ch2);
waterH1.push(wh1);waterH2.push(wh2);
}

new Chart(document.getElementById("calChart"),{
type:"line",
data:{labels,datasets:[
{label:"Hina 熱量",data:calH1,borderColor:"#ff4da6"},
{label:"Hime 熱量",data:calH2,borderColor:"#ff99cc"}
]}
});

new Chart(document.getElementById("waterChart"),{
type:"line",
data:{labels,datasets:[
{label:"Hina 水量",data:waterH1,borderColor:"#4CAF50"},
{label:"Hime 水量",data:waterH2,borderColor:"#81C784"}
]}
});
}

function exportCSV(){
let csv="date,cat,cal,water\n";
meals.forEach(m=>{csv+=`${m.date},${m.cat},${m.cal},${m.water}\n`;});
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.csv";
a.click();
}

function importCSV(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(ev){
let lines=ev.target.result.split("\n").slice(1);
lines.forEach(l=>{
let [date,cat,cal,water]=l.split(",");
if(date) meals.push({date,cat,cal:Number(cal),water:Number(water)});
});
save(); updateStats(); drawCharts();
};
reader.readAsText(file);
}

updateProducts();
updateStats();
drawCharts();
drawWeightChart();
</script>

</body>
</html>
