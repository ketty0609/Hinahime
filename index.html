<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
background:linear-gradient(180deg,#ffd6eb,#ffeef7);
min-height:100vh;
}

.wrapper{
width:100%;
max-width:520px;
margin:0 auto;
padding:20px;
}

h2{
text-align:center;
color:#ff4da6;
margin-bottom:16px;
}

.tabs{
display:flex;
gap:6px;
margin-bottom:16px;
}

.tabs button{
flex:1;
padding:8px;
border:none;
border-radius:10px;
background:#ffd6eb;
color:#d81b60;
font-weight:600;
font-size:13px;
}

.card{
background:white;
padding:16px;
border-radius:20px;
margin-bottom:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}

input[type="date"]{
text-align:center;
background:#f5f5f5;
}

button.action{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:12px;
background:#ff6fa5;
color:white;
font-size:14px;
}

.cat-header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:2px solid #ff6fa5;
}

.meal-item{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:4px;
}

.small-btn{
background:#e53935;
padding:4px 8px;
border-radius:8px;
font-size:11px;
color:white;
border:none;
}

.tab-content{display:none;}

canvas{
max-height:260px;
}

</style>
</head>

<body>
<div class="wrapper">
<h2>🌸 Hina & Hime Pro</h2>

<div class="tabs">
<button onclick="showTab('home')">今日</button>
<button onclick="showTab('products')">產品</button>
<button onclick="showTab('chart')">圖表</button>
</div>

<div id="home" class="tab-content">

<div class="card">
<div class="cat-header">
<img src="IMG_0493.jpeg" class="avatar"><h3>Hina</h3>
</div>
<input type="date" id="hinaDate">
<select id="hinaProduct"></select>
<input id="hinaGrams" type="number" placeholder="克數">
<input id="hinaExtraWater" type="number" placeholder="額外加水 ml">
<button class="action" onclick="addMeal('hina')">新增餵食</button>
<div id="hinaStats"></div>
<div id="hinaMeals"></div>
</div>

<div class="card">
<div class="cat-header">
<img src="IMG_0492.jpeg" class="avatar"><h3>Hime</h3>
</div>
<input type="date" id="himeDate">
<select id="himeProduct"></select>
<input id="himeGrams" type="number" placeholder="克數">
<input id="himeExtraWater" type="number" placeholder="額外加水 ml">
<button class="action" onclick="addMeal('hime')">新增餵食</button>
<div id="himeStats"></div>
<div id="himeMeals"></div>
</div>

</div>

<div id="products" class="tab-content">
<div class="card">
<input id="pname" placeholder="產品名稱">
<input id="cal" type="number" placeholder="每100g熱量">
<input id="water" type="number" placeholder="水分%">
<select id="ptype">
<option value="wet">濕食</option>
<option value="dry">乾食</option>
<option value="soup">湯罐</option>
</select>
<button class="action" onclick="addProduct()">新增產品</button>
</div>
</div>

<div id="chart" class="tab-content">
<div class="card"><canvas id="calChart"></canvas></div>
<div class="card"><canvas id="waterChart"></canvas></div>
</div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[];
let meals=JSON.parse(localStorage.getItem("meals"))||[];

hinaDate.valueAsDate=new Date();
himeDate.valueAsDate=new Date();

function showTab(tab){
document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
document.getElementById(tab).style.display='block';
}
showTab('home');

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("meals",JSON.stringify(meals));
}

function addProduct(){
products.push({name:pname.value,cal:Number(cal.value),water:Number(water.value),type:ptype.value});
save();
updateProducts();
}

function updateProducts(){
hinaProduct.innerHTML="";
himeProduct.innerHTML="";
products.forEach((p,i)=>{
let opt=document.createElement("option");
opt.value=i;
opt.text=p.name;
hinaProduct.appendChild(opt);
himeProduct.appendChild(opt.cloneNode(true));
});
}

function addMeal(cat){
let date=cat==="hina"?hinaDate.value:himeDate.value;
let grams=cat==="hina"?Number(hinaGrams.value):Number(himeGrams.value);
let extra=cat==="hina"?Number(hinaExtraWater.value)||0:Number(himeExtraWater.value)||0;
let product=products[cat==="hina"?hinaProduct.value:himeProduct.value];
if(!product||!grams)return;

let cal=grams/100*product.cal;
let water=0;
if(product.type!=="dry") water+=grams*(product.water/100);
if(product.type==="soup") water+=extra;

meals.push({date,cat,cal,water});
save();
updateStats();
drawCharts();
}

function deleteMeal(i){
meals.splice(i,1);
save();
updateStats();
drawCharts();
}

function updateStats(){
let today=new Date().toISOString().split('T')[0];
let h1=0,h2=0;

hinaMeals.innerHTML="";
himeMeals.innerHTML="";

meals.forEach((m,i)=>{
if(m.date===today){
let text=`🔥${Math.round(m.cal)} 💧${Math.round(m.water)}`;
if(m.cat==="hina"){
h1+=m.cal;
hinaMeals.innerHTML+=`<div class="meal-item">${text}<button class="small-btn" onclick="deleteMeal(${i})">刪</button></div>`;
}else{
h2+=m.cal;
himeMeals.innerHTML+=`<div class="meal-item">${text}<button class="small-btn" onclick="deleteMeal(${i})">刪</button></div>`;
}
}
});

hinaStats.innerHTML=`🔥 今日熱量 ${Math.round(h1)} kcal`;
himeStats.innerHTML=`🔥 今日熱量 ${Math.round(h2)} kcal`;
}

function drawCharts(){

let labels=[],calH1=[],calH2=[],waterH1=[],waterH2=[];

for(let i=6;i>=0;i--){
let d=new Date();
d.setDate(d.getDate()-i);
let ds=d.toISOString().split('T')[0];
labels.push(ds.slice(5));

let ch1=0,ch2=0,wh1=0,wh2=0;

meals.forEach(m=>{
if(m.date===ds){
if(m.cat==="hina"){ch1+=m.cal;wh1+=m.water;}
else{ch2+=m.cal;wh2+=m.water;}
}
});

calH1.push(ch1);
calH2.push(ch2);
waterH1.push(wh1);
waterH2.push(wh2);
}

new Chart(document.getElementById("calChart"),{
type:"line",
data:{
labels,
datasets:[
{
label:"Hina 熱量",
data:calH1,
borderColor:"#e91e63",
backgroundColor:"rgba(233,30,99,0.15)",
borderWidth:4,
pointRadius:5,
tension:0.3
},
{
label:"Hime 熱量",
data:calH2,
borderColor:"#8e24aa",
backgroundColor:"rgba(142,36,170,0.15)",
borderWidth:4,
pointRadius:5,
tension:0.3
}
]
},
options:{
plugins:{
legend:{
labels:{font:{size:14,weight:'bold'}}
}
}
}
});

new Chart(document.getElementById("waterChart"),{
type:"line",
data:{
labels,
datasets:[
{
label:"Hina 水量",
data:waterH1,
borderColor:"#1565c0",
backgroundColor:"rgba(21,101,192,0.15)",
borderWidth:4,
pointRadius:5,
tension:0.3
},
{
label:"Hime 水量",
data:waterH2,
borderColor:"#00897b",
backgroundColor:"rgba(0,137,123,0.15)",
borderWidth:4,
pointRadius:5,
tension:0.3
}
]
},
options:{
plugins:{
legend:{
labels:{font:{size:14,weight:'bold'}}
}
}
}
});

}

updateProducts();
updateStats();
drawCharts();

</script>
</body>
</html>
