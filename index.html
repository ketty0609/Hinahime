<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hina & Hime 飲食日記</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6fa5">
<link rel="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-512.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:linear-gradient(#ffd6eb,#fff);
}

.header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
color:#ff3d87;
}

.tabs{
display:flex;
justify-content:space-around;
padding:10px;
}

.tab-btn{
background:#ffb3d1;
border:none;
padding:8px 12px;
border-radius:20px;
font-weight:bold;
}

.tab-btn.active{
background:#ff6fa5;
color:white;
}

.tab-content{
display:none;
padding:15px;
}

.tab-content.active{
display:block;
}

.card{
background:white;
padding:15px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:12px;
border:1px solid #ddd;
}

button.action{
width:100%;
padding:12px;
background:#ff6fa5;
color:white;
border:none;
border-radius:20px;
font-weight:bold;
}

.progress{
height:12px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
background:#ff3d87;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #ff6fa5;
}

.cat-title{
display:flex;
align-items:center;
gap:10px;
}

.small-btn{
background:#ff3d3d;
color:white;
border:none;
padding:5px 10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🌸 Hina & Hime 飲食日記</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('today')">今日</button>
<button class="tab-btn" onclick="switchTab('product')">產品</button>
<button class="tab-btn" onclick="switchTab('chart')">圖表</button>
<button class="tab-btn" onclick="switchTab('weight')">體重</button>
<button class="tab-btn" onclick="exportData()">匯出</button>
</div>

<!-- 今日 -->
<div id="today" class="tab-content active">

<div class="card">
<div class="cat-title">
<img src="IMG_0493.jpeg" class="avatar">
<h3>Hina</h3>
</div>

<div id="hinaProgressText"></div>
<div class="progress"><div id="hinaBar" class="progress-bar"></div></div>
</div>

<div class="card">
<div class="cat-title">
<img src="IMG_0492.jpeg" class="avatar">
<h3>Hime</h3>
</div>

<div id="himeProgressText"></div>
<div class="progress"><div id="himeBar" class="progress-bar"></div></div>
</div>

</div>

<!-- 產品 -->
<div id="product" class="tab-content">

<div class="card">
<input id="pName" placeholder="產品名稱">
<input id="pCal" type="number" placeholder="每100g熱量">
<input id="pWater" type="number" placeholder="水分%">
<select id="pType">
<option value="濕食">濕食</option>
<option value="乾食">乾食</option>
<option value="湯罐">湯罐</option>
</select>
<button class="action" onclick="addProduct()">新增產品</button>
</div>

<div class="card">
<select onchange="filterProduct(this.value)">
<option value="all">全部</option>
<option value="濕食">濕食</option>
<option value="乾食">乾食</option>
<option value="湯罐">湯罐</option>
</select>
<div id="productList"></div>
</div>

</div>

<!-- 圖表 -->
<div id="chart" class="tab-content">
<div class="card">
<canvas id="calChart"></canvas>
</div>
</div>

<!-- 體重 -->
<div id="weight" class="tab-content">

<div class="card">
<input id="hinaW" type="number" step="0.1" placeholder="Hina 體重 kg">
<input id="himeW" type="number" step="0.1" placeholder="Hime 體重 kg">
<button class="action" onclick="saveWeight()">儲存體重</button>
</div>

<div class="card">
<div id="weightList"></div>
</div>

<div class="card">
<canvas id="weightChart"></canvas>
</div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products")||"[]");
let weights=JSON.parse(localStorage.getItem("weights")||"[]");

function switchTab(id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
event.target.classList.add("active");
}

function addProduct(){
let p={
name:pName.value,
cal:Number(pCal.value),
water:Number(pWater.value),
type:pType.value
};
products.push(p);
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
}

function renderProducts(filter="all"){
productList.innerHTML="";
products.forEach((p,i)=>{
if(filter==="all"||p.type===filter){
productList.innerHTML+=`
<div>
${p.name} (${p.type})
<button class="small-btn" onclick="deleteProduct(${i})">刪</button>
</div>`;
}
});
}

function filterProduct(type){
renderProducts(type);
}

function deleteProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
}

function saveWeight(){
let d=new Date().toLocaleDateString("zh-TW");
weights.push({
date:d,
hina:Number(hinaW.value),
hime:Number(himeW.value)
});
localStorage.setItem("weights",JSON.stringify(weights));
renderWeight();
}

function renderWeight(){
weightList.innerHTML="";
weights.forEach((w,i)=>{
weightList.innerHTML+=`
<div>
${w.date} Hina:${w.hina}kg Hime:${w.hime}kg
<button class="small-btn" onclick="deleteWeight(${i})">刪</button>
</div>`;
});
}

function deleteWeight(i){
weights.splice(i,1);
localStorage.setItem("weights",JSON.stringify(weights));
renderWeight();
}

function exportData(){
let data=JSON.stringify({products,weights});
let blob=new Blob([data],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="hina_hime_backup.json";
a.click();
}

renderProducts();
renderWeight();

</script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
