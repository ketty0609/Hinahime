<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Hina & Hime 飲食日記</title>
<style>
body {font-family: Arial;background:#ffe6f2;padding:15px;}
.card {background:white;padding:15px;border-radius:20px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h2 {color:#ff4da6;text-align:center;}
button {background:#ff80bf;border:none;padding:8px;border-radius:10px;color:white;margin-top:5px;}
input, select {width:100%;padding:8px;margin-top:5px;border-radius:8px;border:1px solid #ddd;}
.product-item {display:flex;justify-content:space-between;margin-top:5px;}
.meal-item {display:flex;justify-content:space-between;margin-top:5px;font-size:14px;}
.progress {background:#ffd6eb;border-radius:20px;height:18px;margin-top:5px;}
.bar {background:#ff66b3;height:100%;border-radius:20px;}
</style>
</head>
<body>

<h2>🌸 Hina & Hime 飲食日記</h2>

<div class="card">
<h3>📦 產品管理</h3>
<input id="pname" placeholder="產品名稱">
<input id="cal" type="number" placeholder="每100g熱量">
<input id="water" type="number" placeholder="水分%">
<select id="ptype">
<option value="wet">濕食</option>
<option value="dry">乾食</option>
</select>
<button onclick="addProduct()">新增產品</button>
<div id="productManage"></div>
</div>

<div class="card">
<h3>🍽 新增餵食</h3>
<input type="date" id="mealDate">
<select id="cat">
<option value="hina">Hina</option>
<option value="hime">Hime</option>
</select>
<select id="productList"></select>
<input id="grams" type="number" placeholder="餵食克數">
<button onclick="addMeal()">新增</button>
</div>

<div class="card">
<h3>📅 查看紀錄</h3>
<input type="date" id="viewDate" onchange="updateStats()">
<div id="stats"></div>
<h4>當日餵食紀錄</h4>
<div id="mealList"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let meals = JSON.parse(localStorage.getItem("meals")) || [];

const goals = { hina:220, hime:160 };

mealDate.valueAsDate = new Date();
viewDate.valueAsDate = new Date();

function save(){
localStorage.setItem("products", JSON.stringify(products));
localStorage.setItem("meals", JSON.stringify(meals));
}

function addProduct(){
if(!pname.value) return alert("請填產品名稱");
products.push({name:pname.value,cal:Number(cal.value),water:Number(water.value),type:ptype.value});
save();
updateProductList();
updateProductManage();
pname.value="";cal.value="";water.value="";
}

function deleteProduct(index){
if(confirm("確定刪除？")){
products.splice(index,1);
save();
updateProductList();
updateProductManage();
}
}

function updateProductList(){
productList.innerHTML="";
products.forEach((p,i)=>{
let opt=document.createElement("option");
opt.value=i;
opt.text=p.name;
productList.appendChild(opt);
});
}

function updateProductManage(){
productManage.innerHTML="";
products.forEach((p,i)=>{
let div=document.createElement("div");
div.className="product-item";
div.innerHTML=`${p.name} <button onclick="deleteProduct(${i})">刪除</button>`;
productManage.appendChild(div);
});
}

function addMeal(){
let p=products[productList.value];
if(!p) return alert("請先新增產品");
let g=Number(grams.value);
if(!g) return alert("請輸入克數");

meals.push({
date:mealDate.value,
cat:cat.value,
product:p.name,
grams:g,
cal:g/100*p.cal,
water:p.type==="wet"?g*(p.water/100):0
});
save();
updateStats();
grams.value="";
}

function deleteMeal(index){
if(confirm("刪除此筆餵食？")){
meals.splice(index,1);
save();
updateStats();
}
}

function updateStats(){
let date=viewDate.value;
let hinaCal=0,hinaWater=0,himeCal=0,himeWater=0;

let todayMeals=meals.filter(m=>m.date===date);

mealList.innerHTML="";

todayMeals.forEach((m)=>{
if(m.cat==="hina"){hinaCal+=m.cal;hinaWater+=m.water;}
else{himeCal+=m.cal;himeWater+=m.water;}

let realIndex = meals.indexOf(m);

let div=document.createElement("div");
div.className="meal-item";
div.innerHTML=`${m.cat} - ${m.product} ${m.grams}g <button onclick="deleteMeal(${realIndex})">刪除</button>`;
mealList.appendChild(div);
});

stats.innerHTML=`
<strong>Hina</strong><br>
🔥 ${Math.round(hinaCal)} / ${goals.hina} kcal
<div class="progress"><div class="bar" style="width:${Math.min(hinaCal/goals.hina*100,100)}%"></div></div>
💧 ${Math.round(hinaWater)} ml<br><br>

<strong>Hime</strong><br>
🔥 ${Math.round(himeCal)} / ${goals.hime} kcal
<div class="progress"><div class="bar" style="width:${Math.min(himeCal/goals.hime*100,100)}%"></div></div>
💧 ${Math.round(himeWater)} ml
`;
}

updateProductList();
updateProductManage();
updateStats();
</script>

</body>
</html>
