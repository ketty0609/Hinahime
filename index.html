<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime 飲食日記</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6fa5">
<link rel="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-512.png">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:linear-gradient(#ffd6eb,#fff);
}

.header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
color:#ff3d87;
}

.tabs{
display:flex;
justify-content:space-around;
padding:10px;
}

.tab-btn{
background:#ffb3d1;
border:none;
padding:8px 14px;
border-radius:20px;
font-weight:bold;
}

.tab-btn.active{
background:#ff3d87;
color:white;
}

.tab-content{display:none;padding:15px;}
.tab-content.active{display:block;}

.card{
background:white;
padding:15px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:12px;
border:1px solid #ddd;
}

button.action{
width:100%;
padding:12px;
background:#ff3d87;
color:white;
border:none;
border-radius:20px;
font-weight:bold;
}

.progress{
height:14px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
background:#ff3d87;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #ff3d87;
}

.cat-title{
display:flex;
align-items:center;
gap:10px;
}

.small-btn{
background:#ff3d3d;
color:white;
border:none;
padding:4px 8px;
border-radius:8px;
margin-left:10px;
}

.record-item{
font-size:14px;
margin-top:5px;
padding:5px 0;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="header">🌸 Hina & Hime 飲食日記</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchTab(event,'today')">今日</button>
<button class="tab-btn" onclick="switchTab(event,'product')">產品</button>
<button class="tab-btn" onclick="switchTab(event,'export')">匯出</button>
</div>

<!-- 今日 -->
<div id="today" class="tab-content active"></div>

<!-- 產品 -->
<div id="product" class="tab-content">

<div class="card">
<input id="pName" placeholder="產品名稱">
<input id="pCal" type="number" placeholder="每100g熱量">
<input id="pWater" type="number" placeholder="水分%">
<select id="pType">
<option value="濕食">濕食</option>
<option value="乾食">乾食</option>
<option value="湯罐">湯罐</option>
</select>
<button class="action" onclick="addProduct()">新增產品</button>
</div>

<div class="card">
<select onchange="renderProducts(this.value)">
<option value="all">全部</option>
<option value="濕食">濕食</option>
<option value="乾食">乾食</option>
<option value="湯罐">湯罐</option>
</select>
<div id="productList"></div>
</div>

</div>

<!-- 匯出 -->
<div id="export" class="tab-content">

<div class="card">
<label>開始日期</label>
<input type="date" id="exportStart">
<label>結束日期</label>
<input type="date" id="exportEnd">
<button class="action" onclick="exportRange()">匯出區間資料</button>
</div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products")||"[]");
let records=JSON.parse(localStorage.getItem("records")||"{}");

function switchTab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

function todayStr(){
return new Date().toISOString().split("T")[0];
}

function rocDate(dateStr){
let d=new Date(dateStr);
return (d.getFullYear()-1911)+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
}

function renderToday(date=todayStr()){

if(!records[date]) records[date]={hina:[],hime:[]};

today.innerHTML="";

["hina","hime"].forEach(cat=>{
let goal=cat==="hina"?220:160;
let totalCal=records[date][cat].reduce((a,b)=>a+b.cal,0);
let totalWater=records[date][cat].reduce((a,b)=>a+b.water,0);

today.innerHTML+=`
<div class="card">

<div class="cat-title">
<img src="${cat==="hina"?"IMG_0493.jpeg":"IMG_0492.jpeg"}" class="avatar">
<h3>${cat==="hina"?"Hina":"Hime"}</h3>
</div>

<input type="date" value="${date}" onchange="renderToday(this.value)">

<p>${rocDate(date)}</p>

<select id="${cat}Product">
${products.map((p,i)=>`<option value="${i}">${p.name}</option>`).join("")}
</select>

<input id="${cat}Gram" type="number" placeholder="餵食克數">
<input id="${cat}Water" type="number" placeholder="額外加水 ml">

<button class="action" onclick="feed('${cat}','${date}')">新增餵食</button>

<p>🔥 今日 ${totalCal.toFixed(1)} kcal / 目標 ${goal}</p>
<div class="progress">
<div class="progress-bar" style="width:${Math.min((totalCal/goal)*100,100)}%"></div>
</div>

<p>💧 今日 ${totalWater} ml</p>

<div>
${records[date][cat].map((r,i)=>`
<div class="record-item">
${r.cal.toFixed(1)} kcal / ${r.water} ml
<button class="small-btn" onclick="deleteRecord('${date}','${cat}',${i})">刪</button>
</div>
`).join("")}
</div>

</div>
`;
});
}

function feed(cat,date){
let idx=document.getElementById(cat+"Product").value;
let gram=document.getElementById(cat+"Gram").value;
let water=Number(document.getElementById(cat+"Water").value)||0;

if(products[idx] && gram){
let cal=(products[idx].cal/100)*gram;
records[date][cat].push({cal:cal,water:water});
localStorage.setItem("records",JSON.stringify(records));
renderToday(date);
}
}

function deleteRecord(date,cat,i){
records[date][cat].splice(i,1);
localStorage.setItem("records",JSON.stringify(records));
renderToday(date);
}

function addProduct(){
products.push({
name:pName.value,
cal:Number(pCal.value),
water:Number(pWater.value),
type:pType.value
});
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
renderToday();
}

function renderProducts(filter="all"){
productList.innerHTML="";
products.forEach((p,i)=>{
if(filter==="all"||p.type===filter){
productList.innerHTML+=`
<div>${p.name} (${p.type})
<button class="small-btn" onclick="deleteProduct(${i})">刪</button>
</div>`;
}
});
}

function deleteProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
}

function exportRange(){
let s=exportStart.value;
let e=exportEnd.value;
let result={};

Object.keys(records).forEach(d=>{
if(d>=s && d<=e){
result[d]=records[d];
}
});

let blob=new Blob([JSON.stringify(result,null,2)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="hina_hime_range.json";
a.click();
}

renderToday();
renderProducts();

</script>

</body>
</html>
