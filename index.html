<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina & Hime 飲食日記</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
background:linear-gradient(180deg,#ffd6eb,#ffeef7);
}

.wrapper{
max-width:520px;
margin:0 auto;
padding:20px 16px 40px 16px;
}

h2{
text-align:center;
color:#e91e63;
margin-bottom:18px;
font-size:22px;
}

.card{
background:white;
border-radius:20px;
padding:16px;
margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.cat-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.avatar{
width:52px;
height:52px;
border-radius:50%;
border:3px solid #ff6fa5;
object-fit:cover;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}

button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:#ff6fa5;
color:white;
font-weight:600;
}

.small-btn{
width:auto;
padding:4px 8px;
background:#e53935;
font-size:12px;
border-radius:8px;
margin-left:8px;
}

.date-display{
text-align:center;
font-weight:600;
font-size:16px;
background:#f5f5f5;
padding:8px;
border-radius:12px;
margin-bottom:8px;
}

.meal-row{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:6px;
}

canvas{max-height:250px;}
</style>
</head>

<body>
<div class="wrapper">
<h2>🌸 Hina & Hime 飲食日記</h2>

<div class="card">
<div class="cat-header">
<img src="IMG_0493.jpeg" class="avatar"><h3>Hina</h3>
</div>
<div class="date-display" id="hinaDate"></div>
<select id="hinaProduct"></select>
<input id="hinaGrams" type="number" placeholder="克數">
<input id="hinaExtraWater" type="number" placeholder="額外加水 ml">
<button onclick="addMeal('hina')">新增餵食</button>
<div id="hinaTotal"></div>
<div id="hinaMeals"></div>
</div>

<div class="card">
<div class="cat-header">
<img src="IMG_0492.jpeg" class="avatar"><h3>Hime</h3>
</div>
<div class="date-display" id="himeDate"></div>
<select id="himeProduct"></select>
<input id="himeGrams" type="number" placeholder="克數">
<input id="himeExtraWater" type="number" placeholder="額外加水 ml">
<button onclick="addMeal('hime')">新增餵食</button>
<div id="himeTotal"></div>
<div id="himeMeals"></div>
</div>

<div class="card">
<h3>📦 產品管理</h3>
<input id="pname" placeholder="產品名稱">
<input id="cal" type="number" placeholder="每100g熱量">
<input id="water" type="number" placeholder="水分%">
<select id="ptype">
<option value="wet">濕食</option>
<option value="dry">乾食</option>
<option value="soup">湯罐</option>
</select>
<button onclick="addProduct()">新增產品</button>
</div>

<div class="card">
<h3>⚖ 體重紀錄</h3>
<input id="hinaWeight" type="number" placeholder="Hina 體重 kg">
<input id="himeWeight" type="number" placeholder="Hime 體重 kg">
<button onclick="saveWeight()">儲存體重</button>
</div>

<div class="card">
<h3>📊 近7日熱量變化</h3>
<canvas id="calChart"></canvas>
</div>

<div class="card">
<h3>💧 近7日水量變化</h3>
<canvas id="waterChart"></canvas>
</div>

<div class="card">
<button onclick="exportData()">📤 匯出資料</button>
</div>

</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[];
let meals=JSON.parse(localStorage.getItem("meals"))||[];
let weights=JSON.parse(localStorage.getItem("weights"))||[];

function todayMinguo(){
let d=new Date();
let y=d.getFullYear()-1911;
let m=(d.getMonth()+1).toString().padStart(2,"0");
let day=d.getDate().toString().padStart(2,"0");
return `${y}年${m}月${day}日`;
}

hinaDate.innerText=todayMinguo();
himeDate.innerText=todayMinguo();

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("meals",JSON.stringify(meals));
localStorage.setItem("weights",JSON.stringify(weights));
}

function addProduct(){
products.push({name:pname.value,cal:Number(cal.value),water:Number(water.value),type:ptype.value});
save();
updateProducts();
}

function updateProducts(){
hinaProduct.innerHTML="";
himeProduct.innerHTML="";
products.forEach((p,i)=>{
let opt=document.createElement("option");
opt.value=i;
opt.text=p.name;
hinaProduct.appendChild(opt);
himeProduct.appendChild(opt.cloneNode(true));
});
}

function addMeal(cat){
let grams=Number(document.getElementById(cat+"Grams").value);
let extra=Number(document.getElementById(cat+"ExtraWater").value)||0;
let product=products[document.getElementById(cat+"Product").value];
if(!product||!grams)return;

let cal=grams/100*product.cal;
let water=product.type!=="dry"?grams*(product.water/100):0;
if(product.type==="soup")water+=extra;

let date=new Date().toISOString().split('T')[0];
meals.push({date,cat,cal,water});
save();
updateDisplay();
drawCharts();
}

function deleteMeal(i){
meals.splice(i,1);
save();
updateDisplay();
drawCharts();
}

function updateDisplay(){
let today=new Date().toISOString().split('T')[0];
let h1=0,h2=0;

hinaMeals.innerHTML="";
himeMeals.innerHTML="";

meals.forEach((m,i)=>{
if(m.date===today){
let row=`🔥${Math.round(m.cal)} 💧${Math.round(m.water)}`;
if(m.cat==="hina"){
h1+=m.cal;
hinaMeals.innerHTML+=`<div class="meal-row">${row}<button class="small-btn" onclick="deleteMeal(${i})">刪</button></div>`;
}else{
h2+=m.cal;
himeMeals.innerHTML+=`<div class="meal-row">${row}<button class="small-btn" onclick="deleteMeal(${i})">刪</button></div>`;
}
}
});

hinaTotal.innerHTML=`🔥 今日熱量 ${Math.round(h1)} kcal`;
himeTotal.innerHTML=`🔥 今日熱量 ${Math.round(h2)} kcal`;
}

function drawCharts(){
let labels=[],cal1=[],cal2=[],water1=[],water2=[];
for(let i=6;i>=0;i--){
let d=new Date();
d.setDate(d.getDate()-i);
let ds=d.toISOString().split('T')[0];
labels.push(ds.slice(5));

let c1=0,c2=0,w1=0,w2=0;
meals.forEach(m=>{
if(m.date===ds){
if(m.cat==="hina"){c1+=m.cal;w1+=m.water;}
else{c2+=m.cal;w2+=m.water;}
}
});
cal1.push(c1);cal2.push(c2);
water1.push(w1);water2.push(w2);
}

new Chart(calChart,{
type:"line",
data:{
labels,
datasets:[
{label:"Hina",data:cal1,borderColor:"#e91e63",borderWidth:4},
{label:"Hime",data:cal2,borderColor:"#8e24aa",borderWidth:4}
]
}
});

new Chart(waterChart,{
type:"line",
data:{
labels,
datasets:[
{label:"Hina",data:water1,borderColor:"#1565c0",borderWidth:4},
{label:"Hime",data:water2,borderColor:"#00897b",borderWidth:4}
]
}
});
}

function saveWeight(){
let date=new Date().toISOString().split('T')[0];
weights.push({date,hina:Number(hinaWeight.value),hime:Number(himeWeight.value)});
save();
alert("已儲存體重");
}

function exportData(){
let data={products,meals,weights};
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="hina_hime_data.json";
a.click();
}

updateProducts();
updateDisplay();
drawCharts();

</script>
</body>
</html>
